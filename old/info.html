      <div class="bio-section">
        <h3 class="section-title" id="bio-title">Biography</h3>
        <div id="bio-content">
          <p class="bio-text" data-pt="Estevan é artista multidisciplinar e designer..." data-en="Estevan is a multidisciplinary artist and designer, developing a practice that pushes the boundaries between design, painting, and sculpture. Graduated in Industrial Design from Universidade Presbiteriana Mackenzie, his work articulates interdiction, desire, and eroticism as devices of symbolic construction, crossing references from popular imagery and sensory experience."></p>
          <p class="bio-text" data-pt="Sua pesquisa investiga..." data-en="His research investigates the tension between body and surface, focusing on what he calls 'Fugitive Forms' — organic structures that challenge the rigidity of materials. Moving between painting, sculpture, object, and textile languages, Estevan seeks to inhabit the 'third margin': a space of suspension between utility and abstraction, where the eroticism of matter and the projection of desire transform the support into a territory of expanded coexistence."></p>
          <p class="bio-text" data-pt="Sua trajetória inclui..." data-en="His trajectory includes relevant passages through institutions such as Itaú Cultural and Theatro Municipal de São Paulo, as well as recognition as a designer at the 10th and 13th Brazilian Graphic Design Biennials (ADG). In the field of visual arts, he consolidated his research focused on materiality and process, holding exhibitions in prominent spaces such as Galeria Sé and Massapê Projetos."></p>
        </div>
      </div>

          <li data-pt="Exposição Coletiva Areoporto..." data-en="Group Exhibition Areoporto (Galeria Castiglioni, São Paulo, 2024)"></li>
          <li data-pt="Exposição individual Formas Fugidias..." data-en="Solo Exhibition Fugitive Forms (Massapê Projetos, São Paulo, 2024)"></li>
          <li data-pt="Exposição individual Estevan Pelli..." data-en="Solo Exhibition Estevan Pelli: The Sharing of the Sensitive (Casa Diária, São Paulo, 2023)"></li>
          <li data-pt="13ª Bienal Brasileira de Design Gráfico..." data-en="13th Brazilian Graphic Design Biennial (São Paulo, 2019)"></li>
          <li data-pt="Exposição Coletiva Conversão..." data-en="Group Exhibition Conversão, Galeria Sé (São Paulo, 2016)"></li>
          <li data-pt="11ª Bienal Brasileira de Design Gráfico..." data-en="11th Brazilian Graphic Design Biennial (São Paulo, 2011)"></li>

  <script src="js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      const header = document.getElementById('site-header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });

    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu-dropdown');
    menuToggle.addEventListener('click', () => mobileMenu.classList.toggle('active'));
    document.addEventListener('click', (e) => { if (!menuToggle.contains(e.target) && !mobileMenu.contains(e.target)) mobileMenu.classList.remove('active'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') mobileMenu.classList.remove('active'); });

    function updateMenuLang() {
      const lang = CMS.getLang();
      document.getElementById('menu-lang-pt').classList.toggle('active', lang === 'PT');
      document.getElementById('menu-lang-en').classList.toggle('active', lang === 'EN');
      document.querySelectorAll('.menu-items a, .desktop-menu a').forEach(link => { const text = link.getAttribute(`data-${lang.toLowerCase()}`); if (text) link.textContent = text; });
    }
    function setLanguage(lang) { CMS.setLang(lang); updateMenuLang(); renderInfo(); }

    function renderInfo() {
      const lang = CMS.getLang();
      document.getElementById('bio-title').textContent = lang === 'PT' ? 'Biografia' : 'Biography';
      document.getElementById('cv-title').textContent = lang === 'PT' ? 'Currículo' : 'Curriculum';
      document.querySelectorAll('#bio-content .bio-text').forEach(p => { const text = p.getAttribute(`data-${lang.toLowerCase()}`); if (text) p.textContent = text; });
      document.querySelectorAll('#cv-list li').forEach(li => { const text = li.getAttribute(`data-${lang.toLowerCase()}`); if (text) li.textContent = text; });
    }
    document.addEventListener('DOMContentLoaded', () => { updateMenuLang(); renderInfo(); });
  </script>
