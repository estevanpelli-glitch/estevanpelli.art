<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estevan Pelli</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230000ff'/%3E%3C/svg%3E">
</head>
<body class="home-page">
  <!-- Header -->
  <header class="site-header">
    <a href="home.html"><h1>ESTEVAN PELLI</h1></a>
  </header>

  <!-- Language Toggle -->
  <div class="lang-toggle">
    <button id="lang-pt" onclick="setLanguage('PT')">PT</button>
    <span class="separator">|</span>
    <button id="lang-en" onclick="setLanguage('EN')">EN</button>
  </div>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Mobile Menu -->
  <nav class="mobile-menu">
    <button class="mobile-menu-close" aria-label="Fechar">&times;</button>
    <ul>
      <li><a href="info.html">Info</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="texts.html">Texts</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="exhibitions.html">Exhibitions</a></li>
      <li><a href="photo-album.html">Photo Album</a></li>
    </ul>
  </nav>

  <!-- Desktop Navigation -->
  <nav class="site-nav">
    <ul>
      <li><a href="info.html">Info</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="texts.html">Texts</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="exhibitions.html">Exhibitions</a></li>
      <li><a href="photo-album.html">Photo Album</a></li>
    </ul>
  </nav>

  <!-- Home Section with Slideshow -->
  <section class="home-section">
    <div class="slideshow" id="slideshow">
      <!-- Slides will be loaded by JavaScript -->
    </div>
    <div class="slide-indicators" id="slide-indicators">
      <!-- Indicators will be loaded by JavaScript -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer home-footer">
    <div class="footer-content">
      <p class="footer-copyright">© 2026 Estevan Pelli <a href="admin/index.html" class="footer-admin-link">Admin</a></p>
      <div class="footer-links">
        <a href="https://instagram.com/estevanpelli" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
        </a>
        <a href="contact.html" data-pt="Contato" data-en="Contact">Contact</a>
        <a href="tags.html">Tags</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Set active language
    function updateLangToggle() {
      const lang = CMS.getLang();
      document.getElementById('lang-pt').classList.toggle('active', lang === 'PT');
      document.getElementById('lang-en').classList.toggle('active', lang === 'EN');
    }

    function setLanguage(lang) {
      CMS.setLang(lang);
      updateLangToggle();
    }

    // Slideshow functionality
    let currentSlide = 0;
    let slides = [];
    let indicators = [];
    let slideshowInterval;

    function loadSlideshow() {
      const data = CMS.getData();
      const slideshowImages = data.slideshow || CMS.defaultData.slideshow;
      
      const slideshowContainer = document.getElementById('slideshow');
      const indicatorsContainer = document.getElementById('slide-indicators');
      
      // Create slides
      slideshowContainer.innerHTML = slideshowImages.map((img, index) => `
        <div class="slide ${index === 0 ? 'active' : ''}">
          <img src="${img}" alt="Estevan Pelli">
        </div>
      `).join('');
      
      // Create indicators
      indicatorsContainer.innerHTML = slideshowImages.map((_, index) => `
        <button class="slide-indicator ${index === 0 ? 'active' : ''}" aria-label="Slide ${index + 1}" onclick="goToSlide(${index})"></button>
      `).join('');
      
      slides = document.querySelectorAll('.slide');
      indicators = document.querySelectorAll('.slide-indicator');
      
      // Start automatic slideshow
      startSlideshow();
    }

    function goToSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });
      indicators.forEach((indicator, i) => {
        indicator.classList.toggle('active', i === index);
      });
      currentSlide = index;
    }

    function nextSlide() {
      const next = (currentSlide + 1) % slides.length;
      goToSlide(next);
    }

    function startSlideshow() {
      if (slideshowInterval) clearInterval(slideshowInterval);
      slideshowInterval = setInterval(nextSlide, 5000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateLangToggle();
      loadSlideshow();
    });
  </script>
</body>
</html>
