<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - Admin - Estevan Pelli</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .config-section {
      background: white;
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .config-section h3 {
      margin-bottom: 24px;
      font-size: 18px;
    }
    .success-message {
      background-color: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body class="admin-body">
  <!-- Admin Header -->
  <header class="admin-header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <a href="dashboard.html" style="color: #666; text-decoration: none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </a>
      <div>
        <h1>Configurações</h1>
        <p>Gerenciamento de login</p>
      </div>
    </div>
    <a href="../index.html" style="color: var(--estevan-blue); text-decoration: none; font-size: 14px;">Ver site</a>
  </header>

  <!-- Main Content -->
  <main class="admin-main" style="max-width: 600px;">
    <!-- Alterar Usuário -->
    <div class="config-section">
      <h3>Alterar Nome de Usuário</h3>
      <div id="user-success" class="success-message">Nome de usuário alterado com sucesso!</div>
      <form id="user-form">
        <div class="form-group">
          <label for="current-user">Nome de usuário atual</label>
          <input type="text" id="current-user" readonly style="background: #f5f5f5;">
        </div>
        <div class="form-group">
          <label for="new-user">Novo nome de usuário *</label>
          <input type="text" id="new-user" required placeholder="Digite o novo nome de usuário">
        </div>
        <div class="form-group">
          <label for="user-password">Senha atual *</label>
          <input type="password" id="user-password" required placeholder="Digite sua senha atual">
        </div>
        <button type="submit" class="btn-primary" style="width: auto;">Alterar Usuário</button>
      </form>
    </div>

    <!-- Alterar Senha -->
    <div class="config-section">
      <h3>Alterar Senha</h3>
      <div id="pass-success" class="success-message">Senha alterada com sucesso!</div>
      <form id="pass-form">
        <div class="form-group">
          <label for="current-pass">Senha atual *</label>
          <input type="password" id="current-pass" required placeholder="Digite sua senha atual">
        </div>
        <div class="form-group">
          <label for="new-pass">Nova senha * <span style="font-size: 12px; color: #999;">(mínimo 6 caracteres)</span></label>
          <input type="password" id="new-pass" required minlength="6" placeholder="Digite a nova senha">
        </div>
        <div class="form-group">
          <label for="confirm-pass">Confirmar nova senha *</label>
          <input type="password" id="confirm-pass" required placeholder="Confirme a nova senha">
        </div>
        <button type="submit" class="btn-primary" style="width: auto;">Alterar Senha</button>
      </form>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    // Check auth
    if (!CMS.checkAdminAuth()) {
      window.location.href = 'index.html';
    }

    // Get current settings from CMS
    const data = CMS.getData();
    const currentUsername = data.settings?.username || 'admin';
    document.getElementById('current-user').value = currentUsername;

    // Change username
    document.getElementById('user-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newUser = document.getElementById('new-user').value.trim();
      const password = document.getElementById('user-password').value;
      
      // Verify current password
      if (!CMS.login(currentUsername, password)) {
        alert('Senha atual incorreta.');
        return;
      }
      
      // Update credentials via CMS
      const updatedData = CMS.getData();
      updatedData.settings.username = newUser;
      CMS.saveData(updatedData);
      
      // Show success
      document.getElementById('user-success').style.display = 'block';
      document.getElementById('current-user').value = newUser;
      document.getElementById('new-user').value = '';
      document.getElementById('user-password').value = '';
      
      setTimeout(() => {
        document.getElementById('user-success').style.display = 'none';
      }, 3000);
    });

    // Change password
    document.getElementById('pass-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const currentPass = document.getElementById('current-pass').value;
      const newPass = document.getElementById('new-pass').value;
      const confirmPass = document.getElementById('confirm-pass').value;
      
      // Verify current password
      if (!CMS.login(currentUsername, currentPass)) {
        alert('Senha atual incorreta.');
        return;
      }
      
      if (newPass.length < 6) {
        alert('A nova senha deve ter no mínimo 6 caracteres.');
        return;
      }
      
      if (newPass !== confirmPass) {
        alert('As senhas não coincidem.');
        return;
      }
      
      // Update password via CMS
      const updatedData = CMS.getData();
      updatedData.settings.password = newPass;
      CMS.saveData(updatedData);
      
      // Show success
      document.getElementById('pass-success').style.display = 'block';
      document.getElementById('current-pass').value = '';
      document.getElementById('new-pass').value = '';
      document.getElementById('confirm-pass').value = '';
      
      setTimeout(() => {
        document.getElementById('pass-success').style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
