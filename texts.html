      <li><a href="news.html" data-pt="News" data-en="News">News</a></li>

  <main class="content-page">

        <div class="clarice-quote-mark">"</div>

  <script src="js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      const header = document.getElementById('site-header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });

    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu-dropdown');
    menuToggle.addEventListener('click', () => mobileMenu.classList.toggle('active'));
    document.addEventListener('click', (e) => { if (!menuToggle.contains(e.target) && !mobileMenu.contains(e.target)) mobileMenu.classList.remove('active'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') mobileMenu.classList.remove('active'); });

    const clariceTexts = {
      PT: `O que diz este jazz que é improviso? diz braços enovelados em pernas e as chamas subindo e eu passiva como uma carne que é devorada pelo adunco agudo de uma águia que interrompe seu voo cego. Expresso a mim e a ti os meus desejos mais ocultos e consigo com as palavras uma orgíaca beleza confusa. Estremeco de prazer por entre a novidade de usar palavras que formam intenso matagal. Luto por conquistar mais profundamente a minha liberdade de sensações e pensamentos, sem nenhum sentido utilitário: sou sozinha, eu e minha liberdade.`,
      EN: `What does this jazz that is improvisation say? it says arms tangled with legs and the flames rising and I passive like meat that is devoured by the sharp hook of an eagle that interrupts its blind flight. I express to me and to you my most hidden desires and achieve an orgiastic confused beauty. I tremble with pleasure amidst the novelty of using words that form an intense thicket. I struggle to conquer more deeply my freedom of sensations and thoughts, without any utilitarian meaning: I am alone, I and my freedom.`
    };

    function updateMenuLang() {
      const lang = CMS.getLang();
      document.getElementById('menu-lang-pt').classList.toggle('active', lang === 'PT');
      document.getElementById('menu-lang-en').classList.toggle('active', lang === 'EN');
      document.querySelectorAll('.menu-items a, .desktop-menu a').forEach(link => { const text = link.getAttribute(`data-${lang.toLowerCase()}`); if (text) link.textContent = text; });
    }
    function setLanguage(lang) { CMS.setLang(lang); updateMenuLang(); renderTexts(); }

    function renderTexts() {
      const container = document.getElementById('texts-list');
      const posts = CMS.getPostsBySection('texts');
      const lang = CMS.getLang();
      document.getElementById('clarice-text').textContent = clariceTexts[lang];
      if (posts.length === 0) { container.innerHTML = `<p style="color:#0000ff;opacity:0.7;">${lang==='PT'?'Nenhum texto encontrado.':'No texts found.'}</p>`; return; }
      container.innerHTML = posts.map(post => {
        const title = post[`title${lang}`] || post.titlePT;
        const excerpt = (post[`description${lang}`] || post.descriptionPT || '').replace(/<[^>]*>/g, '').substring(0, 200) + '...';
        const images = post.images || [post.imageUrl];
        return `
        <article class="text-list-item" onclick="window.location.href='texto.html?id=${post.id}'">
          <div class="text-list-image"><img src="${images[0]}" alt="${title}"></div>
          <h3 class="text-list-title">${title}</h3>
          <p class="text-list-meta">${formatDate(post.date)}</p>
          <p class="text-list-excerpt">${excerpt}</p>
        </article>`;
      }).join('');
    }
    document.addEventListener('DOMContentLoaded', () => { updateMenuLang(); renderTexts(); });
  </script>
</body>
</html>
