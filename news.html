  <script>
    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu-dropdown');
    
    if (menuToggle && mobileMenu) {
      menuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
      });

      document.addEventListener('click', (e) => {
        if (!menuToggle.contains(e.target) && !mobileMenu.contains(e.target)) {
          mobileMenu.classList.remove('active');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') mobileMenu.classList.remove('active');
      });
    }

    // Header scroll effect
    window.addEventListener('scroll', () => {
      const header = document.getElementById('site-header');
      if (header) {
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
      }
    });

    // Update language visual indicators
    function updateLanguageUI() {
      if (typeof CMS === 'undefined' || !CMS.getLang) return;
      
      const lang = CMS.getLang();
      
      // Update header buttons
      const ptBtn = document.getElementById('menu-lang-pt');
      const enBtn = document.getElementById('menu-lang-en');
      const headerPt = document.getElementById('header-lang-pt');
      const headerEn = document.getElementById('header-lang-en');
      
      if (ptBtn) ptBtn.classList.toggle('active', lang === 'PT');
      if (enBtn) enBtn.classList.toggle('active', lang === 'EN');
      if (headerPt) headerPt.classList.toggle('active', lang === 'PT');
      if (headerEn) headerEn.classList.toggle('active', lang === 'EN');
      
      // Update menu text
      document.querySelectorAll('[data-pt][data-en]').forEach(el => {
        const text = el.getAttribute(`data-${lang.toLowerCase()}`);
        if (text) el.textContent = text;
      });
    }

    // Controle do link Admin/Login no footer
    function updateAdminLink() {
      const adminLinkText = document.getElementById('admin-link-text');
      if (!adminLinkText) return;
      
      if (sessionStorage.getItem('adminToken')) {
        // Está logado - mostra Admin em verde
        adminLinkText.textContent = '● Admin';
        adminLinkText.href = 'admin/dashboard.html';
        adminLinkText.style.color = '#00aa00';
        adminLinkText.style.opacity = '1';
        adminLinkText.style.fontWeight = '600';
      } else {
        // Não está logado - mostra Login
        adminLinkText.textContent = 'Login';
        adminLinkText.href = 'admin/index.html';
        adminLinkText.style.color = 'var(--estevan-blue)';
        adminLinkText.style.opacity = '0.6';
        adminLinkText.style.fontWeight = 'normal';
      }
    }

    // Run when page loads
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(updateLanguageUI, 100);
      updateAdminLink();
    });
  </script>
